<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Moments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Arabic"', 'Arial', 'sans-serif'] },
                    colors: { ink: '#151515', paper: '#f6f7f9', yt: '#cc0000', panel: '#ffffff' }
                }
            }
        }
    </script>
    <style>
        body { font-family: "Noto Sans Arabic", Arial, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-paper text-ink">
    <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-6 sm:px-6 lg:px-8">
        <section class="rounded-lg border border-black/10 bg-panel shadow-sm">
            <div class="border-b border-black/10 p-5 sm:p-6">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div class="flex h-11 w-11 items-center justify-center rounded-md bg-yt text-white">
                            <i data-lucide="youtube" class="h-6 w-6"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-extrabold leading-tight">YouTube Moments</h1>
                            <p class="text-sm font-semibold text-black/55">DownSub transcripts + MiniMax-M3 analysis</p>
                        </div>
                    </div>
                    <span id="model-label" class="rounded-md border border-black/10 bg-black/[.03] px-3 py-2 text-xs font-bold text-black/60">
                        minimaxai/minimax-m3
                    </span>
                </div>
            </div>

            <div class="grid gap-5 p-5 sm:p-6 lg:grid-cols-[360px_1fr]">
                <aside class="space-y-4">
                    <label class="block space-y-2">
                        <span class="text-sm font-bold">رابط فيديو YouTube أو معرف الفيديو</span>
                        <textarea id="video-input" rows="4" dir="ltr" class="w-full resize-none rounded-md border border-black/15 bg-white px-3 py-3 text-left text-sm leading-6 outline-none transition focus:border-yt focus:ring-2 focus:ring-yt/15" placeholder="https://www.youtube.com/watch?v=..."></textarea>
                    </label>

                    <div class="grid grid-cols-2 gap-2">
                        <button id="highlights-btn" class="inline-flex h-11 items-center justify-center gap-2 rounded-md bg-yt px-4 text-sm font-extrabold text-white transition hover:bg-red-800">
                            <i data-lucide="sparkles" class="h-4 w-4"></i>
                            اللحظات
                        </button>
                        <button id="principles-btn" class="inline-flex h-11 items-center justify-center gap-2 rounded-md border border-black/15 bg-white px-4 text-sm font-extrabold transition hover:bg-black/5">
                            <i data-lucide="layers-3" class="h-4 w-4"></i>
                            المبادئ
                        </button>
                    </div>

                    <button id="refresh-btn" class="inline-flex h-11 w-full items-center justify-center gap-2 rounded-md border border-black/15 bg-white px-4 text-sm font-extrabold transition hover:bg-black/5">
                        <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                        إعادة التحليل
                    </button>

                    <div class="rounded-md border border-black/10 bg-black/[.03] p-4">
                        <div class="mb-2 flex items-center gap-2 text-sm font-bold">
                            <span id="status-dot" class="h-2.5 w-2.5 rounded-full bg-zinc-400"></span>
                            <span id="status-text">جاهز</span>
                        </div>
                        <div id="status-detail" class="text-xs font-medium leading-6 text-black/55">
                            أدخل رابط فيديو ثم اختر نوع التحليل.
                        </div>
                    </div>
                </aside>

                <section class="min-h-[520px] rounded-md border border-black/10 bg-white">
                    <div class="flex items-center justify-between gap-3 border-b border-black/10 p-4">
                        <h2 id="result-title" class="text-lg font-extrabold">النتائج</h2>
                        <a id="youtube-link" class="hidden text-xs font-bold text-yt hover:underline" target="_blank" rel="noreferrer" dir="ltr"></a>
                    </div>
                    <div id="results" class="space-y-3 p-4">
                        <div class="rounded-md border border-dashed border-black/20 p-8 text-center text-black/50">
                            لا توجد نتائج بعد.
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
